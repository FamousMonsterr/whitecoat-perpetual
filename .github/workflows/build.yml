name: Unity Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-unity6-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-unity6-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          # CRITICAL: Only UNITY_LICENSE is passed. No EMAIL, PASSWORD, or SERIAL.
          # This forces the action to use the .ulf file for activation instead of online login.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.0f1
          buildMethod: BuildScript.PerformBuild
          versioning: Semantic
          allowDirtyBuild: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhitecoatPerpetual_Win64
          path: build/StandaloneWindows64/
          retention-days: 7
