name: Unity Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-unity6-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-unity6-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          # PERSONAL LICENSE SETUP:
          # Ensure the following secrets are set in GitHub Settings > Secrets and Variables > Actions:
          # 1. UNITY_LICENSE: Content of your .ulf file (Unity_lic.ulf)
          # 2. UNITY_EMAIL: Your Unity account email (recommended for Personal licenses)
          # 3. UNITY_PASSWORD: Your Unity account password (recommended for Personal licenses)
          #
          # NOTE: If you have a PRO license, remove UNITY_LICENSE and use UNITY_SERIAL instead.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.0f1
          buildMethod: BuildScript.PerformBuild
          versioning: Semantic
          allowDirtyBuild: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhitecoatPerpetual_Win64
          path: build/StandaloneWindows64/
          retention-days: 7
