name: Unity Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library and Packages
        uses: actions/cache@v4
        with:
          path: |
            Library
            Packages
          key: Library-${{ runner.os }}-unity6-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-unity6-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.0f1
          buildMethod: BuildValidator.ForceBuild
          versioning: Semantic
          allowDirtyBuild: true
          customParameters: -logFile -

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhitecoatPerpetual_Win64
          path: build/StandaloneWindows64/
          retention-days: 7
