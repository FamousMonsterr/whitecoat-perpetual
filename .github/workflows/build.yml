name: Unity Windows Build (Unity 6)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-unity6-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_NO_WEBGL: true
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.0f1
          buildMethod: BuildScript.PerformBuild
          versioning: Semantic
          useCustomBuilder: false
          allowDirtyBuild: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhitecoatPerpetual_Win64_Unity6
          path: Builds/Windows/
          retention-days: 7
