name: Unity Continuous Integration Pipeline (Win64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_windows_standalone:
    name: Build for Windows 64-bit Architecture
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository with LFS Support
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Initialize Caching Mechanism for Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-unity6000-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-unity6000-

      - name: Execute Autonomous Unity Compilation Phase
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SKIP_ACTIVATION: false
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.4.0f1
          buildMethod: BuildValidator.ForceBuild
          versioning: Semantic
          allowDirtyBuild: true
          customParameters: -manualExit

      - name: Archive and Publish Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Executable_Windows64_Build
          path: build/StandaloneWindows64/
          retention-days: 14
